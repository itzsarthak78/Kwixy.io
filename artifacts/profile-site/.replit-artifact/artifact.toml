kind = "web"
previewPath = "/"
title = "Personal Profile Website"
version = "1.0.0"
id = "artifacts/profile-site"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19593

[services.development]
run = "pnpm --filter @workspace/profile-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/profile-site", "run", "build" ]
serve = "static"
publicDir = "artifacts/profile-site/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19593"
BASE_PATH = "/"
